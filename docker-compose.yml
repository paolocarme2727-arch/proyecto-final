services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  kafka:
    image: apache/kafka:3.7.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

  discovery-server:
    build:
      context: .
      dockerfile: discovery-server/Dockerfile
    ports:
      - "8761:8761"

  config-server:
    build:
      context: .
      dockerfile: config-server/Dockerfile
    ports:
      - "8888:8888"
    depends_on:
      - discovery-server

  customer-service:
    build:
      context: .
      dockerfile: customer-service/Dockerfile
    ports:
      - "8081:8081"
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      EUREKA_INSTANCE_HOSTNAME: customer-service
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      SPRING_DATA_MONGODB_URI: mongodb://mongo:27017/customerdb
    depends_on:
      - mongo
      - config-server
      - discovery-server

  credit-service:
    build:
      context: .
      dockerfile: credit-service/Dockerfile
    ports:
      - "8083:8083"
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      EUREKA_INSTANCE_HOSTNAME: credit-service
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      SPRING_DATA_MONGODB_URI: mongodb://mongo:27017/creditdb
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATA_REDIS_HOST: redis
    depends_on:
      - mongo
      - redis
      - kafka
      - config-server
      - discovery-server

  account-service:
    build:
      context: .
      dockerfile: account-service/Dockerfile
    ports:
      - "8082:8082"
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      EUREKA_INSTANCE_HOSTNAME: account-service
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      SPRING_DATA_MONGODB_URI: mongodb://mongo:27017/accountdb
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATA_REDIS_HOST: redis
      BANKING_SERVICES_CREDIT_URL: http://credit-service:8083
    depends_on:
      - mongo
      - redis
      - kafka
      - config-server
      - discovery-server
      - credit-service

  wallet-service:
    build:
      context: .
      dockerfile: wallet-service/Dockerfile
    ports:
      - "8084:8084"
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      EUREKA_INSTANCE_HOSTNAME: wallet-service
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      SPRING_DATA_MONGODB_URI: mongodb://mongo:27017/walletdb
      SPRING_DATA_REDIS_HOST: redis
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      - mongo
      - redis
      - kafka
      - config-server
      - discovery-server

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      EUREKA_INSTANCE_HOSTNAME: api-gateway
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      BANKING_SERVICES_CUSTOMER_URL: http://customer-service:8081
      BANKING_SERVICES_ACCOUNT_URL: http://account-service:8082
      BANKING_SERVICES_CREDIT_URL: http://credit-service:8083
      BANKING_SERVICES_WALLET_URL: http://wallet-service:8084
    depends_on:
      - config-server
      - discovery-server
      - customer-service
      - account-service
      - credit-service
      - wallet-service
