openapi: 3.0.3
info:
  title: API de movimientos
  version: 1.0.0
servers:
  - url: http://localhost:8082
tags:
  - name: Movement
paths:
  /api/v1/accounts/{id}/deposits:
    post:
      tags: [Movement]
      operationId: depositAccount
      summary: Realizar un depósito
      parameters:
        - $ref: './common-openapi.yaml#/components/parameters/Id'
      requestBody:
        $ref: './common-openapi.yaml#/components/requestBodies/Money'
      responses:
        '200':
          description: Movimiento de depósito
          content:
            application/json:
              schema:
                $ref: './common-openapi.yaml#/components/schemas/AccountMovement'
  /api/v1/accounts/{id}/withdrawals:
    post:
      tags: [Movement]
      operationId: withdrawAccount
      summary: Realizar un retiro
      parameters:
        - $ref: './common-openapi.yaml#/components/parameters/Id'
      requestBody:
        $ref: './common-openapi.yaml#/components/requestBodies/Money'
      responses:
        '200':
          description: Movimiento de retiro
          content:
            application/json:
              schema:
                $ref: './common-openapi.yaml#/components/schemas/AccountMovement'
  /api/v1/accounts/{id}/movements:
    get:
      tags: [Movement]
      operationId: findAccountMovements
      summary: Listar movimientos de cuenta
      parameters:
        - $ref: './common-openapi.yaml#/components/parameters/Id'
      responses:
        '200':
          description: Lista de movimientos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: './common-openapi.yaml#/components/schemas/AccountMovement'
