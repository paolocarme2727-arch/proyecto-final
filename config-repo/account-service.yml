server:
  port: 8082

spring:
  data:
    mongodb:
      uri: mongodb://localhost:27017/accountdb
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      properties:
        spring.json.trusted.packages: "*"
        spring.json.use.type.headers: false
        spring.json.value.default.type: com.example.bank.accounts.events.CreditDebtStatusEvent

banking:
  services:
    credit-url: http://localhost:8083
  accounts:
    savings-monthly-movement-limit: 20
    checking-maintenance-fee: 15.00
    minimum-opening-amount: 0.00
    free-transaction-limit: 20
    transaction-fee: 3.50
    vip-monthly-minimum-average-amount: 500.00

logging:
  level:
    com.example.bank.accounts: DEBUG

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

resilience4j:
  circuitbreaker:
    instances:
      creditService:
        sliding-window-size: 5
        minimum-number-of-calls: 3
        failure-rate-threshold: 50
  timelimiter:
    instances:
      creditService:
        timeout-duration: 2s

security:
  jwt:
    secret: ${JWT_SECRET}
