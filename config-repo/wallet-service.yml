server:
  port: 8084

spring:
  data:
    mongodb:
      uri: mongodb://localhost:27017/walletdb
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      retries: 3
      value-serializer: org.apache.kafka.common.serialization.ByteArraySerializer

banking:
  kafka:
    retry:
      max-attempts: 3

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

security:
  jwt:
    secret: ${JWT_SECRET}

logging:
  level:
    com.example.bank.wallets: DEBUG
