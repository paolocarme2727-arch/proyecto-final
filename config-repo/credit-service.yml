server:
  port: 8083

spring:
  data:
    mongodb:
      uri: mongodb://localhost:27017/creditdb
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092

logging:
  level:
    com.example.bank.credits: DEBUG

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

resilience4j:
  timelimiter:
    configs:
      default:
        timeout-duration: 2s

security:
  jwt:
    secret: ${JWT_SECRET}
