server:
  port: 8081

spring:
  application:
    name: customer-service
  config:
    import: optional:configserver:http://localhost:8888
  data:
    mongodb:
      uri: mongodb://localhost:27017/customerdb

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

resilience4j:
  timelimiter:
    configs:
      default:
        timeout-duration: 2s

security:
  jwt:
    secret: ${JWT_SECRET}
