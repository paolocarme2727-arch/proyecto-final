openapi: 3.0.3
info:
  title: API de monedero Yanki
  version: 1.0.0
servers:
  - url: http://localhost:8084
tags:
  - name: Wallet
paths:
  /api/v1/wallets:
    post:
      tags: [Wallet]
      operationId: createWallet
      summary: Crear un monedero móvil Yanki
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WalletRequest'
      responses:
        '201':
          description: Monedero creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Wallet'
    get:
      tags: [Wallet]
      operationId: findAllWallets
      summary: Listar monederos
      responses:
        '200':
          description: Lista de monederos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Wallet'
  /api/v1/wallets/{id}:
    get:
      tags: [Wallet]
      operationId: findWalletById
      summary: Buscar un monedero por id
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Monedero encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Wallet'
components:
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string
  schemas:
    DocumentType:
      type: string
      enum: [DNI, CEX, PASSPORT]
    WalletRequest:
      type: object
      required: [documentType, documentNumber, phoneNumber, imei, email]
      properties:
        documentType:
          $ref: '#/components/schemas/DocumentType'
        documentNumber:
          type: string
        phoneNumber:
          type: string
        imei:
          type: string
        email:
          type: string
          format: email
    Wallet:
      allOf:
        - $ref: '#/components/schemas/WalletRequest'
        - type: object
          properties:
            id:
              type: string
            debitCardId:
              type: string
            balance:
              type: number
            createdAt:
              type: string
              format: date-time
            updatedAt:
              type: string
              format: date-time
